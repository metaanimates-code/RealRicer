$accent = rgb(192, 192, 192)
$font = MesloLGS Nerd Font Mono Bold
$text = rgb(240, 240, 240)

# GENERAL
general {
    disable_loading_bar = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = /home/shrek/Monochrome/7513279.png
    blur_passes = 3
    blur_size = 8
}

# TIME
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%H:%M")"
    color = rgb(204, 204, 204)
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE 
label {
    monitor = 
    text = cmd[update:43200000] echo "$(date +"%A, %d %B")"
    color = $text
    font_size = 24
    font_family = $font
    position = -30, -120
    halign = right
    valign = top
}

# USER AVATAR
image {
    monitor = 
    path = ~/.face
    size = 100
    border_color = $accent
    border_size = 3
    position = 0, 60
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = rgba(30, 34, 46, 0.8)
    font_color = $text
    fade_on_empty = false
    placeholder_text = "󰌾 Logged in as $USER"
    hide_input = false
    check_color = $accent
    fail_color = rgb(172, 172, 172)
    fail_text = "Wrong password"
    capslock_color = rgb(234, 234, 234)
    position = 0, -60
    halign = center
    valign = center
    rounding = 8
}
